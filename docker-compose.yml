version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clearring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clearring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clearring_dev}
      POSTGRES_DB: ${POSTGRES_DB:-clearring_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - clearring_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clearring} -d ${POSTGRES_DB:-clearring_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clearring_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - clearring_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clearring_postgres_data:
    name: clearring_postgres_data
  clearring_redis_data:
    name: clearring_redis_data

networks:
  default:
    name: clearring_network
